name: 瓶颈猎手 · 周复盘

on:
  schedule:
    # 周日 19:00 ET = UTC 周一 00:00 (夏令时 23:00 周日)
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/stock-screener-social-analysis-rg81C

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r scripts/requirements.txt

      - name: Run weekly review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-7' }}
          CLAUDE_EFFORT: ${{ vars.CLAUDE_EFFORT || 'high' }}
        run: python scripts/run_scan.py weekly

      - name: Commit and push review
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "04-AI工具箱/提示词与工作流/瓶颈猎手-美股每日进化系统/07-每日复盘归档/"
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "review: 周复盘 ${DATE}"
          git push
