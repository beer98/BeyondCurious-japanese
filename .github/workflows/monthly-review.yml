name: 瓶颈猎手 · 月复盘

on:
  schedule:
    # 每月 28-31 号都跑一次（取月内最后一次执行作为月复盘）
    - cron: "0 1 28-31 * *"
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/stock-screener-social-analysis-rg81C

      - name: Skip if not last day of month
        id: gate
        run: |
          TOMORROW=$(date -u -d '+1 day' +%d)
          if [ "$TOMORROW" = "01" ]; then
            echo "is_last=true" >> $GITHUB_OUTPUT
          else
            echo "is_last=false" >> $GITHUB_OUTPUT
            echo "今天不是月底，跳过"
          fi

      - if: steps.gate.outputs.is_last == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.is_last == 'true'
        run: pip install -r scripts/requirements.txt

      - if: steps.gate.outputs.is_last == 'true'
        name: Run monthly review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-7' }}
          CLAUDE_EFFORT: ${{ vars.CLAUDE_EFFORT || 'xhigh' }}
        run: python scripts/run_scan.py monthly

      - if: steps.gate.outputs.is_last == 'true'
        name: Commit and push review
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "04-AI工具箱/提示词与工作流/瓶颈猎手-美股每日进化系统/07-每日复盘归档/"
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          MONTH=$(date -u +"%Y-%m")
          git commit -m "review: 月复盘 ${MONTH}"
          git push
