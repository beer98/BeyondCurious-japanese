name: 瓶颈猎手 · 每日盘前扫描

on:
  schedule:
    # 美东时间 07:30 ET 周一至周五 = UTC 11:30 / 12:30（夏令时差异）
    # 用两个 cron 覆盖：标准时 12:30 UTC，夏令时 11:30 UTC
    - cron: "30 11 * * 1-5"
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      portfolio:
        description: "当前持仓（可选，例如 \"$LITE 8% / cash 30%\"）"
        required: false
        default: ""
      macro_note:
        description: "今日宏观备注（可选）"
        required: false
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/stock-screener-social-analysis-rg81C

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-7' }}
          CLAUDE_EFFORT: ${{ vars.CLAUDE_EFFORT || 'high' }}
          PORTFOLIO: ${{ inputs.portfolio }}
          MACRO_NOTE: ${{ inputs.macro_note }}
        run: python scripts/run_scan.py daily

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "04-AI工具箱/提示词与工作流/瓶颈猎手-美股每日进化系统/07-每日复盘归档/"
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "scan: 每日盘前报告 ${DATE}"
          git push
